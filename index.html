<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amanahku - Task Management System</title>
  <!-- Favicon: pakai file favicon yang sama seperti di aplikasi (opsional) -->
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/14D2euZYL6gzDV3PH5DxKth_ai2RTTru4">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #f4f6f5;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #6b7280;
      font-size: 14px;
    }
    iframe {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div id="loading">Bismillah Loading Amanahku - Task Management System...</div>

  <!--
    GANTI URL di bawah ini dengan Web App URL Amanahku Anda sendiri
    (yang berakhiran /exec, sama seperti yang Anda salin dari
    Deploy > Manage deployments, dan yang Anda isi ke Script Property
    WEBAPP_URL sebelumnya).
  -->
  <iframe
    src="https://script.google.com/macros/s/AKfycbx-ZH6zWcpcFz0pst-yugL3g1aikn8lUh3wutwEiqfLgZ21JHJaeP_muuOjytPRoh-H5Q/exec"
    title="Amanahku"
    allow="clipboard-write"
    onload="document.getElementById('loading').style.display='none';">
  </iframe>
</body>
</html>
